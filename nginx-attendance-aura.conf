server {
  listen 80;
  server_name attendance.example.edu;

  root /var/www/attendance-aura/smart-attendance-test-1/dist;
  index index.html index.htm;

  access_log /var/log/nginx/attendance-aura.access.log;
  error_log /var/log/nginx/attendance-aura.error.log;

  location /socket.io/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|svg|ico|json|txt|map)$ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
